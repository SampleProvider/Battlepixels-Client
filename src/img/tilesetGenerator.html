<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Battlepixels Tileset Generator</title>
    <link rel="icon" href="./img/favicon.png" type="image/x-icon">
    <style>
        body {
            margin: 0px;
            overflow: hidden;
            --border-size: 1px;
        }

        * {
            box-sizing: content-box;
        }
        #body {
            display: grid;
            grid-gap: 4px;
            border: 2px solid black;
            margin: 8px;
            padding: 8px;
            grid-template-columns: auto auto;
            text-align: center;
        }
        #title {
            font-size: 40px;
            grid-column: span 2;
        }
        #body label {
            text-align: right;
        }
        #body input {
            grid-column: 2;
            width: 300px;
        }
        #body select {
            grid-column: 2;
            width: 306px;
        }
        #body button {
            grid-column: 2;
            min-width: 100px;
            width: 292px;
        }
</style>
</head>

<body>
    <div id="body">
        <div id="title">Battlepixels Tileset Generator</div>
        <label for="input">Upload File:</label>
        <input type="file" id="input">
        <button id="generateButton">Generate!</button>
        <script>
            const input = document.getElementById("input");
            const generateButton = document.getElementById("generateButton");

            generateButton.onclick = function() {
                if (input.files != null && input.files[0] != null) {
                    generating = true;
                    var reader = new FileReader();
                    reader.onload = function(e) {
                        const image = new Image();
                        image.src = e.target.result;
                        image.onload = function() {

                            let inputMap = [
                                {
                                    x: 0,
                                    y: 0,
                                    data: {
                                        0: [0, 0],
                                        64: [1, 0],
                                        1: [0, 1],
                                        193: [1, 1],
                                        65: [3, 1],
                                    },
                                },
                                {
                                    x: 1,
                                    y: 0,
                                    data: {
                                        0: [1, 0],
                                        1: [1, 1],
                                        4: [0, 0],
                                        7: [0, 1],
                                        5: [2, 1],
                                    },
                                },
                                {
                                    x: 1,
                                    y: 1,
                                    data: {
                                        0: [1, 1],
                                        4: [0, 1],
                                        16: [1, 0],
                                        28: [0, 0],
                                        20: [2, 0],
                                    },
                                },
                                {
                                    x: 0,
                                    y: 1,
                                    data: {
                                        0: [0, 1],
                                        16: [0, 0],
                                        64: [1, 1],
                                        112: [1, 0],
                                        80: [3, 0],
                                    },
                                },
                            ];

                            let outputMap = [
                                [0, 4, 92, 124, 116, 80, 0],
                                [16, 20, 87, 223, 241, 21, 64],
                                [29, 117, 85, 71, 221, 125, 112],
                                [31, 253, 113, 28, 127, 247, 209],
                                [23, 199, 213, 95, 255, 245, 81],
                                [5, 84, 93, 119, 215, 193, 17],
                                [0, 1, 7, 197, 69, 68, 65],
                            ];

                            const canvas = document.createElement("canvas");
                            let resolution = image.width / 4;
                            canvas.width = resolution * outputMap[0].length;
                            canvas.height = resolution * outputMap.length;
                            const ctx = canvas.getContext("2d");
                            ctx.imageSmoothingEnabled = false;
                            ctx.webkitImageSmoothingEnabled = false;
                            ctx.mozImageSmoothingEnabled = false;

                            for (let y = 0; y < outputMap.length; y++) {
                                for (let x = 0; x < outputMap[y].length; x++) {
                                    for (let i in inputMap) {
                                        let max = 0;
                                        let maxIndex = 0;
                                        for (let j in inputMap[i].data) {
                                            let value = outputMap[y][x] & Number(j);
                                            if (value > max) {
                                                max = value;
                                                maxIndex = j;
                                            }
                                        }
                                        console.log(x, y, i, maxIndex)
                                        ctx.drawImage(image, inputMap[i].x * resolution / 2 + inputMap[i].data[maxIndex][0] * resolution, inputMap[i].y * resolution / 2 + inputMap[i].data[maxIndex][1] * resolution, resolution / 2, resolution / 2, inputMap[i].x * resolution / 2 + x * resolution, inputMap[i].y * resolution / 2 + y * resolution, resolution / 2, resolution / 2);
                                    }
                                }
                            }

                            canvas.toBlob(function(blob) {
                                const a = document.createElement("a");
                                a.href = URL.createObjectURL(blob);
                                a.download = "output.png";
                                a.click();
                            });
                        };
                    };
                    reader.readAsDataURL(input.files[0]);
                }
                else {
                    alert("No image uploaded!");
                }
            };
        </script>
    </div>
</body>

</html>
